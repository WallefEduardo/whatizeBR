services:
  # PostgreSQL - Database
  postgres:
    image: postgres:16-alpine
    container_name: whatize_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=whatize
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatize

  # Redis - Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: whatize_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whatize

  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: whatize_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=whatize
      - RABBITMQ_DEFAULT_PASS=secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - whatize

  # MinIO - Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: whatize_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=whatize
      - MINIO_ROOT_PASSWORD=whatize123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - whatize

  # Soketi - WebSocket Server (Pusher replacement)
  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    container_name: whatize_soketi
    ports:
      - "6001:6001"
      - "9601:9601"
    environment:
      - SOKETI_DEBUG=1
      - SOKETI_DEFAULT_APP_ID=whatize-app
      - SOKETI_DEFAULT_APP_KEY=whatizeappkey
      - SOKETI_DEFAULT_APP_SECRET=whatizeappsecret
    networks:
      - whatize

networks:
  whatize:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
