version: '3.8'

services:
  # Nginx - Web Server
  nginx:
    image: nginx:alpine
    container_name: whatize_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - whatize

  # PHP-FPM - Application
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: whatize_php
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=whatize
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - whatize

  # Worker - Queue Worker
  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: whatize_worker
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=whatize
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - whatize

  # PostgreSQL - Database
  postgres:
    image: postgres:16-alpine
    container_name: whatize_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=whatize
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whatize

  # Redis - Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: whatize_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whatize

  # RabbitMQ - Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: whatize_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=whatize
      - RABBITMQ_DEFAULT_PASS=secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - whatize

  # MinIO - Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: whatize_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=whatize
      - MINIO_ROOT_PASSWORD=secret123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - whatize

networks:
  whatize:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
